<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Summarizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            color: #212529;
        }
        
        .app {
            max-width: 660px;
            margin: 0 auto;
            padding: 3rem 1.25rem;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .yt-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: #FF0000;
            border-radius: 14px;
            margin-bottom: 1rem;
        }
        
        .yt-icon svg {
            width: 28px;
            height: 28px;
        }
        
        .hero h1 {
            font-size: 22px;
            font-weight: 600;
            color: #111;
            margin-bottom: 0.5rem;
        }
        
        .hero p {
            font-size: 14px;
            color: #6c757d;
            line-height: 1.6;
            max-width: 380px;
            margin: 0 auto;
        }
        
        .url-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid #d0d5dd;
            border-radius: 10px;
            padding: 13px 16px;
            margin-bottom: 14px;
            transition: border-color 0.15s;
        }
        
        .url-box:focus-within {
            border-color: #aab4be;
        }
        
        .url-box svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: #adb5bd;
        }
        
        .url-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: #212529;
            outline: none;
        }
        
        .url-box input::placeholder {
            color: #adb5bd;
        }
        
        .summarize-btn {
            width: 100%;
            padding: 14px;
            background: #2563EB;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            transition: background 0.15s;
        }
        
        .summarize-btn:hover {
            background: #1D4ED8;
        }
        
        .summarize-btn:disabled {
            background: #93C5FD;
            cursor: not-allowed;
        }
        
        .summarize-btn svg {
            width: 18px;
            height: 18px;
        }
        
        .loader {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 1.5rem 0;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #BFDBFE;
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loader span {
            font-size: 13px;
            color: #6c757d;
        }
        
        .error-box {
            display: none;
            padding: 11px 16px;
            background: #fff5f5;
            border: 1px solid #fecaca;
            border-radius: 10px;
            font-size: 13px;
            color: #b91c1c;
            margin-top: 1rem;
        }
        
        .result-card {
            display: none;
            margin-top: 1.5rem;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            overflow: hidden;
        }
        
        .result-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .result-label {
            font-size: 12px;
            font-weight: 500;
            color: #6c757d;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .copy-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            background: transparent;
            border: 1px solid #d0d5dd;
            border-radius: 999px;
            font-size: 12px;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .copy-btn:hover {
            background: #f8f9fa;
            color: #111;
        }
        
        .copy-btn.copied {
            border-color: #86efac;
            color: #15803d;
            background: #f0fdf4;
        }
        
        .copy-btn svg {
            width: 13px;
            height: 13px;
        }
        
        .summary-body {
            padding: 1.25rem;
            font-size: 14px;
            color: #212529;
            line-height: 1.8;
        }
        
        .summary-body h3 {
            font-size: 14px;
            font-weight: 600;
            margin: 1.2rem 0 0.4rem;
        }
        
        .summary-body h3:first-child {
            margin-top: 0;
        }
        
        .summary-body ul {
            padding-left: 1.2rem;
        }
        
        .summary-body li {
            margin-bottom: 5px;
        }
        
        .summary-body p {
            margin-bottom: 0.6rem;
        }
        
        .copy-footer {
            padding: 0.875rem 1.25rem;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
        }
        
        .footnote {
            text-align: center;
            font-size: 11px;
            color: #adb5bd;
            margin-top: 2rem;
        }
        
        @media (max-width: 480px) {
            .app {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="app">
        <div class="hero">
            <div class="yt-icon">
                <svg viewBox="0 0 24 24" fill="white">
                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
            </div>
            <h1>YouTube Video Link To Summary</h1>
            <p>Paste a YouTube link down below and get a structured summary of the video.</p>
        </div>

        <div class="url-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
            <input type="url" id="urlInput" placeholder="Paste a YouTube video url here" />
        </div>

        <button class="summarize-btn" id="generateBtn" onclick="generateSummary()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Generate Summary
    </button>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <span>Generating summary...</span>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="result-card" id="resultCard">
            <div class="result-top">
                <span class="result-label">Summary</span>
                <button class="copy-btn" id="copyTopBtn" onclick="copySummary()">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="5" y="5" width="9" height="9" rx="1.5"/>
                    <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
                </svg>
                <span id="copyTopLabel">Copy</span>
            </button>
            </div>
            <div class="summary-body" id="summaryContent"></div>
            <div class="copy-footer">
                <button class="copy-btn" id="copyBottomBtn" onclick="copySummary()">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="5" y="5" width="9" height="9" rx="1.5"/>
                    <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2h-6A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5"/>
                </svg>
                <span id="copyBottomLabel">Copy summary</span>
            </button>
            </div>
        </div>

        <p class="footnote">Powered by Google Gemini 2.5 Flash</p>
    </div>

    <script>
        let rawSummaryText = "";

        async function generateSummary() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const errorBox = document.getElementById('errorBox');
            const summaryContent = document.getElementById('summaryContent');

            if (!url) {
                alert('Please paste a YouTube URL.');
                return;
            }

            btn.disabled = true;
            loader.style.display = 'flex';
            resultCard.style.display = 'none';
            errorBox.style.display = 'none';

            try {
                const res = await fetch('/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Something went wrong.');

                rawSummaryText = data.summary;
                summaryContent.innerHTML = data.summary
                    .replace(/### (.*)/g, '<h3>$1</h3>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/^\* (.*)/gm, '<li>$1</li>')
                    .replace(/\n\n/g, '<br>');

                resultCard.style.display = 'block';
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') generateSummary();
        });

        function copySummary() {
            if (!rawSummaryText) return;
            navigator.clipboard.writeText(rawSummaryText).then(() => {
                ['copyTopBtn', 'copyBottomBtn'].forEach(id => document.getElementById(id).classList.add('copied'));
                document.getElementById('copyTopLabel').textContent = 'Copied!';
                document.getElementById('copyBottomLabel').textContent = 'Copied!';
                setTimeout(() => {
                    ['copyTopBtn', 'copyBottomBtn'].forEach(id => document.getElementById(id).classList.remove('copied'));
                    document.getElementById('copyTopLabel').textContent = 'Copy';
                    document.getElementById('copyBottomLabel').textContent = 'Copy summary';
                }, 2000);
            });
        }
    </script>

</body>

</html>
